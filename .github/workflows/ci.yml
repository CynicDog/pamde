name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "py-pamde/**"
      - "ui/**"
      - "crates/**"
      - "Dockerfile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "py-pamde/**"
      - "ui/**"
      - "crates/**"
      - "Dockerfile"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        working-directory: py-pamde
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]" maturin

      - name: Build Rust extension
        working-directory: py-pamde/runtime/pamde-runtime
        run: ../../.venv/bin/maturin develop

      - name: Ruff lint
        working-directory: py-pamde
        run: .venv/bin/ruff check src/

      - name: Ruff format check
        working-directory: py-pamde
        run: .venv/bin/ruff format --check src/

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: TypeScript type check
        working-directory: ui
        run: npx tsc --noEmit

      - name: Run Python tests
        working-directory: py-pamde
        run: .venv/bin/pytest tests/ -v

  build-and-push:
    needs: lint-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
